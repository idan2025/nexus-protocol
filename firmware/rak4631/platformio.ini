; NEXUS Firmware -- RAK4631 (nRF52840 + SX1262)
;
; Board: RAKwireless RAK4631 WisBlock Core
; MCU:   nRF52840 (Cortex-M4F, 256KB SRAM, 1MB flash)
; Radio: SX1262 (via SPI, on WisBlock Base)

[env:rak4631]
platform = nordicnrf52
board = wiscore_rak4631
board_dir = boards
framework = arduino

; Pre-build: symlink libnexus + common sources
extra_scripts = pre:../common/link_sources.py

; Build flags
build_flags =
    -DNX_PLATFORM_NRF52
    -DNX_LORA_RF_SWITCH_EXTERNAL=1
    -I${PROJECT_DIR}/../../lib/include
    -I${PROJECT_DIR}/../../lib/vendor
    ; Shrink tables for 256KB SRAM (SoftDevice + FreeRTOS need ~80KB)
    -DNX_SESSION_MAX=4
    -DNX_SESSION_MAX_SKIP=8
    -DNX_FRAG_REASSEMBLY_SLOTS=2
    -DNX_MAX_NEIGHBORS=16
    -DNX_MAX_ROUTES=16
    -DNX_MAX_DEDUP=32
    -DNX_MAX_PENDING_RREQ=4
    -DNX_GROUP_MAX=4
    -DNX_GROUP_MAX_MEMBERS=8

; Dependencies
lib_deps =
    jgromes/RadioLib@^7.0.0

; Serial monitor
monitor_speed = 115200
