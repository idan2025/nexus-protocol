; NEXUS Firmware -- RAK4631 (nRF52840 + SX1262)
;
; Board: RAKwireless RAK4631 WisBlock Core
; MCU:   nRF52840 (Cortex-M4F, 256KB SRAM, 1MB flash)
; Radio: SX1262 (via SPI, on WisBlock Base)

[env:rak4631]
platform = nordicnrf52
board = wiscore_rak4631
board_dir = boards
framework = arduino

; Build flags
build_flags =
    -DNX_PLATFORM_NRF52
    -I${PROJECT_DIR}/../../lib/include
    -I${PROJECT_DIR}/../../lib/vendor
    -I${PROJECT_DIR}/../common

; Source directory is project root so we can reference all sources
build_src_dir = ${PROJECT_DIR}/../..

; Source files
build_src_filter =
    +<firmware/rak4631/src/>
    +<firmware/common/radiolib_hal.cpp>
    +<lib/src/identity.c>
    +<lib/src/packet.c>
    +<lib/src/crypto.c>
    +<lib/src/transport.c>
    +<lib/src/announce.c>
    +<lib/src/route.c>
    +<lib/src/fragment.c>
    +<lib/src/anchor.c>
    +<lib/src/session.c>
    +<lib/src/group.c>
    +<lib/src/node.c>
    +<lib/src/platform/platform_nrf52.c>
    +<lib/vendor/monocypher/monocypher.c>
    +<transports/lora/nexus_lora.c>
    +<transports/lora/nexus_lora_asf.c>

; Dependencies
lib_deps =
    jgromes/RadioLib@^7.0.0

; Serial monitor
monitor_speed = 115200
