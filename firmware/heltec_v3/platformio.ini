; NEXUS Firmware -- Heltec WiFi LoRa 32 V3 (ESP32-S3 + SX1262)
;
; Board: Heltec WiFi LoRa 32 (V3)
; MCU:   ESP32-S3 (dual-core Xtensa LX7, 512KB SRAM, 8MB flash)
; Radio: SX1262 (via SPI)
; Display: SSD1306 0.96" OLED (I2C)
; BLE:   NimBLE (ESP32 integrated)

[env:heltec_v3]
platform = espressif32
board = heltec_wifi_lora_32_V3
framework = arduino

; Build flags
build_flags =
    -DNX_PLATFORM_ESP32
    -I../../lib/include
    -I../../lib/vendor
    -I../common
    -DCONFIG_BT_NIMBLE_ROLE_PERIPHERAL
    -DCONFIG_BT_NIMBLE_ROLE_BROADCASTER

; Source files
build_src_filter =
    +<src/>
    +<../common/radiolib_hal.cpp>
    +<../common/ble_bridge.cpp>
    +<../common/identity_store.cpp>
    +<../../lib/src/identity.c>
    +<../../lib/src/packet.c>
    +<../../lib/src/crypto.c>
    +<../../lib/src/transport.c>
    +<../../lib/src/announce.c>
    +<../../lib/src/route.c>
    +<../../lib/src/fragment.c>
    +<../../lib/src/anchor.c>
    +<../../lib/src/session.c>
    +<../../lib/src/group.c>
    +<../../lib/src/node.c>
    +<../../lib/src/platform/platform_esp32.c>
    +<../../lib/vendor/monocypher/monocypher.c>
    +<../../transports/lora/nexus_lora.c>
    +<../../transports/lora/nexus_lora_asf.c>

; Dependencies
lib_deps =
    jgromes/RadioLib@^7.0.0
    h2zero/NimBLE-Arduino@^2.0.0

; Serial monitor
monitor_speed = 115200

; Partition scheme with OTA support
board_build.partitions = min_spiffs.csv
