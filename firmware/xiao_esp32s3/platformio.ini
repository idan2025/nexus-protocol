; NEXUS Firmware -- Seeed XIAO ESP32S3 + WIO-SX1262
;
; Board: Seeed Studio XIAO ESP32S3
; MCU:   ESP32-S3 (dual-core Xtensa LX7, 512KB SRAM, 8MB flash)
; Radio: SX1262 (via SPI, WIO-SX1262 expansion board)
; BLE:   NimBLE (ESP32-S3 integrated)
; WiFi:  ESP32-S3 integrated (available for future gateway use)
; Display: NONE

[env:xiao_esp32s3]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino

; Pre-build: symlink libnexus + common sources
extra_scripts = pre:../common/link_sources.py

; Build flags
build_flags =
    -DNX_PLATFORM_ESP32
    -I${PROJECT_DIR}/../../lib/include
    -I${PROJECT_DIR}/../../lib/vendor
    -DCONFIG_BT_NIMBLE_ROLE_PERIPHERAL
    -DCONFIG_BT_NIMBLE_ROLE_BROADCASTER

; Dependencies (no U8g2 -- this board has no display)
lib_deps =
    jgromes/RadioLib@^7.0.0
    h2zero/NimBLE-Arduino@^2.0.0

; Serial monitor
monitor_speed = 115200

; Partition scheme with OTA support
board_build.partitions = min_spiffs.csv
