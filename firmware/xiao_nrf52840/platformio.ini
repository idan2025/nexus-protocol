; NEXUS Firmware -- Seeed XIAO nRF52840 + WIO-SX1262
;
; Board: Seeed Studio XIAO nRF52840
; MCU:   nRF52840 (Cortex-M4F, 256KB SRAM, 1MB flash)
; Radio: SX1262 (via SPI, WIO-SX1262 expansion board)
; BLE:   Bluefruit (nRF52840 SoftDevice S140)
; Display: NONE

[env:xiao_nrf52840]
platform = nordicnrf52
board = seeed_xiao_nrf52840
board_dir = boards
framework = arduino

; Pre-build: symlink libnexus + common sources
extra_scripts = pre:../common/link_sources.py

; Build flags
build_flags =
    -DNX_PLATFORM_NRF52
    -I${PROJECT_DIR}/../../lib/include
    -I${PROJECT_DIR}/../../lib/vendor

; Dependencies
lib_deps =
    jgromes/RadioLib@^7.0.0

; Serial monitor
monitor_speed = 115200
