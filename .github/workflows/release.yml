name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential python3

      - name: Build C library
        run: |
          mkdir -p build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc)

      - name: Run tests
        run: cd build && ctest --output-on-failure

      - name: Run Python tests
        run: |
          cd bindings/python/tests
          PYTHONPATH=.. python3 -m unittest discover -v

      - name: Package
        run: |
          mkdir -p release
          cp build/lib/libnexus.a release/
          cp -r lib/include/nexus release/
          tar czf nexus-linux-x64.tar.gz -C release .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nexus-linux-x64
          path: nexus-linux-x64.tar.gz

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.11.1'

      - name: Build APK
        run: cd android && gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nexus-mesh-android
          path: android/app/build/outputs/apk/debug/*.apk

  build-firmware:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [heltec_v3, rak4631]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Install RAK4631 board support
        if: matrix.target == 'rak4631'
        run: |
          pio pkg install -g -p nordicnrf52
          BOARDS_DIR=$(find ~/.platformio/platforms/nordicnrf52*/boards -maxdepth 0 2>/dev/null | head -1)
          cp firmware/rak4631/boards/wiscore_rak4631.json "$BOARDS_DIR/"
          VARIANTS_DIR=$(find ~/.platformio/packages/framework-arduinoadafruitnrf52/variants -maxdepth 0 2>/dev/null | head -1)
          if [ -n "$VARIANTS_DIR" ]; then
            mkdir -p "$VARIANTS_DIR/WisCore_RAK4631_Board"
            curl -sL https://raw.githubusercontent.com/RAKWireless/WisBlock/master/PlatformIO/RAK4630/WisCore_RAK4631_Board/variant.h -o "$VARIANTS_DIR/WisCore_RAK4631_Board/variant.h"
            curl -sL https://raw.githubusercontent.com/RAKWireless/WisBlock/master/PlatformIO/RAK4630/WisCore_RAK4631_Board/variant.cpp -o "$VARIANTS_DIR/WisCore_RAK4631_Board/variant.cpp"
          fi

      - name: Build firmware
        run: cd firmware/${{ matrix.target }} && pio run

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.target }}
          path: firmware/${{ matrix.target }}/.pio/build/**/firmware.*

  create-release:
    needs: [build-linux, build-android]
    if: always() && needs.build-linux.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release files
        run: |
          mkdir -p release-files
          cp artifacts/nexus-linux-x64/nexus-linux-x64.tar.gz release-files/ 2>/dev/null || true
          find artifacts/nexus-mesh-android -name '*.apk' -exec cp {} release-files/ \; 2>/dev/null || true
          find artifacts/firmware-heltec_v3 -name 'firmware.*' -exec cp {} release-files/ \; 2>/dev/null || true
          find artifacts/firmware-rak4631 -name 'firmware.*' -exec cp {} release-files/ \; 2>/dev/null || true
          ls -la release-files/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-files/*
