name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential python3

      - name: Build C library
        run: |
          mkdir -p build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc)

      - name: Run tests
        run: cd build && ctest --output-on-failure

      - name: Run Python tests
        run: |
          cd bindings/python/tests
          PYTHONPATH=.. python3 -m unittest discover -v

      - name: Package
        run: |
          mkdir -p release
          cp build/lib/libnexus.a release/
          cp -r lib/include/nexus release/
          tar czf nexus-linux-x64.tar.gz -C release .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nexus-linux-x64
          path: nexus-linux-x64.tar.gz

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.11.1'

      - name: Build APK
        run: cd android && gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nexus-mesh-android
          path: android/app/build/outputs/apk/debug/*.apk

  build-firmware:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [heltec_v3, rak4631, xiao_esp32s3, xiao_nrf52840]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Install RAK4631 board support
        if: matrix.target == 'rak4631'
        run: |
          # Install the nordicnrf52 platform to resolve all dependencies
          pio pkg install -g -p nordicnrf52
          # Install the framework package so variant directory exists
          pio pkg install -g -t framework-arduinoadafruitnrf52 2>/dev/null || true
          # Copy board definition
          BOARDS_DIR=$(find ~/.platformio/platforms/nordicnrf52*/boards -maxdepth 0 2>/dev/null | head -1)
          if [ -n "$BOARDS_DIR" ]; then
            cp firmware/rak4631/boards/wiscore_rak4631.json "$BOARDS_DIR/"
          fi
          # Install variant files for RAK4631
          VARIANTS_DIR=$(find ~/.platformio/packages/framework-arduinoadafruitnrf52*/variants -maxdepth 0 2>/dev/null | head -1)
          if [ -z "$VARIANTS_DIR" ]; then
            VARIANTS_DIR=$(find ~/.platformio -path "*/framework-arduinoadafruitnrf52/variants" -maxdepth 5 2>/dev/null | head -1)
          fi
          echo "Variants dir: $VARIANTS_DIR"
          if [ -n "$VARIANTS_DIR" ]; then
            mkdir -p "$VARIANTS_DIR/WisCore_RAK4631_Board"
            curl -sL https://raw.githubusercontent.com/RAKWireless/WisBlock/master/PlatformIO/RAK4630/WisCore_RAK4631_Board/variant.h -o "$VARIANTS_DIR/WisCore_RAK4631_Board/variant.h"
            curl -sL https://raw.githubusercontent.com/RAKWireless/WisBlock/master/PlatformIO/RAK4630/WisCore_RAK4631_Board/variant.cpp -o "$VARIANTS_DIR/WisCore_RAK4631_Board/variant.cpp"
          fi

      - name: Install XIAO nRF52840 board support
        if: matrix.target == 'xiao_nrf52840'
        run: |
          # Install the nordicnrf52 platform
          pio pkg install -g -p nordicnrf52
          pio pkg install -g -t framework-arduinoadafruitnrf52 2>/dev/null || true
          # Copy board definition
          BOARDS_DIR=$(find ~/.platformio/platforms/nordicnrf52*/boards -maxdepth 0 2>/dev/null | head -1)
          if [ -n "$BOARDS_DIR" ]; then
            cp firmware/xiao_nrf52840/boards/seeed_xiao_nrf52840.json "$BOARDS_DIR/"
          fi
          # Install variant files for XIAO nRF52840
          VARIANTS_DIR=$(find ~/.platformio/packages/framework-arduinoadafruitnrf52*/variants -maxdepth 0 2>/dev/null | head -1)
          if [ -z "$VARIANTS_DIR" ]; then
            VARIANTS_DIR=$(find ~/.platformio -path "*/framework-arduinoadafruitnrf52/variants" -maxdepth 5 2>/dev/null | head -1)
          fi
          echo "Variants dir: $VARIANTS_DIR"
          if [ -n "$VARIANTS_DIR" ]; then
            # Check if variant already exists in BSP
            if [ ! -d "$VARIANTS_DIR/Seeed_XIAO_nRF52840" ]; then
              mkdir -p "$VARIANTS_DIR/Seeed_XIAO_nRF52840"
              curl -sL https://raw.githubusercontent.com/Seeed-Studio/Adafruit_nRF52_Arduino/master/variants/Seeed_XIAO_nRF52840/variant.h -o "$VARIANTS_DIR/Seeed_XIAO_nRF52840/variant.h"
              curl -sL https://raw.githubusercontent.com/Seeed-Studio/Adafruit_nRF52_Arduino/master/variants/Seeed_XIAO_nRF52840/variant.cpp -o "$VARIANTS_DIR/Seeed_XIAO_nRF52840/variant.cpp"
            fi
          fi

      - name: Build firmware
        run: cd firmware/${{ matrix.target }} && pio run

      - name: Create merged binary for web flasher (ESP32 targets)
        if: matrix.target == 'heltec_v3' || matrix.target == 'xiao_esp32s3'
        run: |
          pip install esptool
          ENV_DIR=$(ls -d firmware/${{ matrix.target }}/.pio/build/*/ 2>/dev/null | head -1)
          if [ -z "$ENV_DIR" ]; then
            ENV_DIR="firmware/${{ matrix.target }}/.pio/build/${{ matrix.target }}"
          fi
          echo "Build dir: $ENV_DIR"
          ls -la "$ENV_DIR/"*.bin 2>/dev/null || true
          if [ -f "$ENV_DIR/firmware.bin" ] && [ -f "$ENV_DIR/bootloader.bin" ] && [ -f "$ENV_DIR/partitions.bin" ]; then
            python3 -m esptool --chip esp32s3 merge_bin \
              -o "firmware/${{ matrix.target }}/nexus-${{ matrix.target }}-webflash.bin" \
              --flash_mode dio --flash_freq 80m --flash_size 8MB \
              0x0 "$ENV_DIR/bootloader.bin" \
              0x8000 "$ENV_DIR/partitions.bin" \
              0x10000 "$ENV_DIR/firmware.bin"
            echo "Created merged webflash binary"
          else
            echo "WARNING: Missing bootloader/partitions, copying firmware.bin as webflash"
            cp "$ENV_DIR/firmware.bin" "firmware/${{ matrix.target }}/nexus-${{ matrix.target }}-webflash.bin"
          fi

      - name: Convert hex to UF2 (nRF52 targets)
        if: matrix.target == 'rak4631' || matrix.target == 'xiao_nrf52840'
        run: |
          curl -sL https://raw.githubusercontent.com/microsoft/uf2/master/utils/uf2conv.py -o uf2conv.py
          curl -sL https://raw.githubusercontent.com/microsoft/uf2/master/utils/uf2families.json -o uf2families.json
          BUILD_DIR="firmware/${{ matrix.target }}/.pio/build"
          HEX_FILE=$(find "$BUILD_DIR" -name 'firmware.hex' | head -1)
          if [ -n "$HEX_FILE" ]; then
            python3 uf2conv.py "$HEX_FILE" -c -f 0xADA52840 -o "${HEX_FILE%.hex}.uf2"
            echo "Converted $HEX_FILE to UF2"
          fi

      - name: Collect firmware binaries
        run: |
          BUILD_DIR="firmware/${{ matrix.target }}/.pio/build"
          # ESP32: app .bin + merged webflash .bin
          find "$BUILD_DIR" -name 'firmware.bin' -exec cp {} \
            "firmware/${{ matrix.target }}/nexus-${{ matrix.target }}.bin" \;
          # nRF52: .uf2 (drag-and-drop) + .hex (J-Link)
          find "$BUILD_DIR" -name 'firmware.uf2' -exec cp {} \
            "firmware/${{ matrix.target }}/nexus-${{ matrix.target }}.uf2" \;
          find "$BUILD_DIR" -name 'firmware.hex' -exec cp {} \
            "firmware/${{ matrix.target }}/nexus-${{ matrix.target }}.hex" \;
          ls -la firmware/${{ matrix.target }}/nexus-* 2>/dev/null || true

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.target }}
          path: firmware/${{ matrix.target }}/nexus-${{ matrix.target }}*

  create-release:
    needs: [build-linux, build-android, build-firmware]
    if: always() && needs.build-linux.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release files
        run: |
          mkdir -p release-files
          cp artifacts/nexus-linux-x64/nexus-linux-x64.tar.gz release-files/ 2>/dev/null || true
          find artifacts/nexus-mesh-android -name '*.apk' -exec cp {} release-files/ \; 2>/dev/null || true
          # Firmware binaries (app .bin, webflash .bin, .uf2, .hex)
          for target in heltec_v3 rak4631 xiao_esp32s3 xiao_nrf52840; do
            find "artifacts/firmware-${target}" -name "nexus-${target}*" -exec cp {} release-files/ \; 2>/dev/null || true
          done
          ls -la release-files/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-files/*

  update-pages:
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download firmware artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Copy webflash bins into docs/firmware/
        run: |
          mkdir -p docs/firmware
          for target in heltec_v3 xiao_esp32s3; do
            SRC=$(find "artifacts/firmware-${target}" -name "nexus-${target}-webflash.bin" 2>/dev/null | head -1)
            if [ -n "$SRC" ]; then
              cp "$SRC" "docs/firmware/nexus-${target}-webflash.bin"
              echo "Copied ${target} webflash binary ($(stat -c%s "$SRC") bytes)"
            else
              echo "WARNING: ${target} webflash binary not found"
            fi
          done
          ls -la docs/firmware/ || true

      - name: Commit updated webflash bins
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/firmware/
          if git diff --staged --quiet; then
            echo "No webflash changes to commit"
          else
            git commit -m "chore(pages): update webflash bins for ${{ github.ref_name }} [skip ci]"
            git push origin main
          fi
