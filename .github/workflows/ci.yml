name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential python3

      - name: Build C library
        run: |
          mkdir -p build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Debug
          make -j$(nproc)

      - name: Run C tests
        run: cd build && ctest --output-on-failure

      - name: Run Python tests
        run: |
          cd bindings/python/tests
          PYTHONPATH=.. python3 -m unittest discover -v

      - name: Upload libnexus
        uses: actions/upload-artifact@v4
        with:
          name: libnexus-linux-x64
          path: build/lib/libnexus.a
